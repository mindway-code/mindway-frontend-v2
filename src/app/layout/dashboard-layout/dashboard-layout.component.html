<section class="dashboard-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <!-- LOGO -->
    <div class="sidebar-top">

      <div class="logo-area">

        <img
          src="assets/imagem/logo.png"
          alt="MindWay"
          class="main-logo"
        />

      </div>

      <!-- CARD USUÁRIO -->
      <div class="user-card">

        <img
          src="assets/imagem/PerfilPai.png"
          alt="Usuário"
          class="user-avatar"
        />

        <div class="user-info">

          <strong>
            <ng-container *ngIf="currentUser$ | async as user; else fallback">
              {{ user.name || user.email }}
            </ng-container>

            <ng-template #fallback>
              Usuário
            </ng-template>
          </strong>

          <span>Responsável</span>

        </div>

      </div>

    </div>

    <!-- MENU -->
    <nav class="sidebar-menu">

      <a
        routerLink="/profile"
        routerLinkActive="active"
        class="menu-item"
      >
        <span>👤</span>
        Meu Perfil
      </a>

      <a
        routerLink="/anamnesis"
        routerLinkActive="active"
        class="menu-item"
      >
        <span>📝</span>
        Anamnese
      </a>

      <a
        routerLink="/child-profile"
        routerLinkActive="active"
        class="menu-item"
      >
        <span>🧒</span>
        Perfil da Criança
      </a>

      <a
        routerLink="/child-profile/observations"
        routerLinkActive="active"
        class="menu-item"
      >
        <span>👁️</span>
        Observações
      </a>

      <a
        routerLink="/reports-child"
        routerLinkActive="active"
        class="menu-item"
      >
        <span>📊</span>
        Relatórios
      </a>

      <a
        routerLink="/profile/social-network"
        routerLinkActive="active"
        class="menu-item"
      >
        <span>🌐</span>
        Rede de Apoio
      </a>

    </nav>

    <!-- FOOTER -->
    <div class="sidebar-footer">

      <a
        routerLink="/"
        class="logout-btn"
      >
        🚪 Sair
      </a>

    </div>

  </aside>

  <!-- CONTEÚDO -->
  <main class="main-content">

    <!-- HEADER -->
    <header class="topbar">

      <div class="topbar-left">

        <h1>Anamnese da Criança</h1>

        <p>
          Preencha as informações para avaliação inicial
        </p>

      </div>

      <div class="topbar-right">

        <button class="notification-btn">
          🔔
        </button>

        <div class="topbar-user">

          <img
            src="assets/imagem/PerfilPai.png"
            alt="Usuário"
          />

          <span>
            <ng-container *ngIf="currentUser$ | async as user">
              {{ user.name || 'Usuário' }}
            </ng-container>
          </span>

        </div>

      </div>

    </header>

    <!-- PÁGINA -->
    <section class="page-content">

      <router-outlet></router-outlet>

    </section>

  </main>

</section>
