<section class="anamnesis-page">
  <header class="anamnesis-page__header">
    <div>
      <p class="anamnesis-page__eyebrow">Child anamnesis</p>
      <h1 class="anamnesis-page__title">Anamnesis</h1>
      <p class="anamnesis-page__subtitle">Select a child to view and manage anamnesis information.</p>
    </div>
  </header>

  <app-child-selector
    [children]="children$ | async"
    [selectedChildId]="selectedChildId"
    [loading]="(childrenLoading$ | async) ?? false"
    (selectedChildIdChange)="onChildSelected($event)"
  ></app-child-selector>

  <section *ngIf="childrenError$ | async as error" class="anamnesis-page__error card-ui card-ui--md card-ui--accent">
    <div class="card-ui__body">{{ error }}</div>
  </section>

  <ng-container *ngIf="loading$ | async; else anamnesisContent">
    <section class="anamnesis-page__state card-ui card-ui--md">
      <div class="card-ui__body">Loading anamnesis...</div>
    </section>
  </ng-container>

  <ng-template #anamnesisContent>
    <section *ngIf="error$ | async as error" class="anamnesis-page__error card-ui card-ui--md card-ui--accent">
      <div class="card-ui__body">{{ error }}</div>
    </section>

    <app-anamnesis-empty-state
      *ngIf="!(anamnesis$ | async)"
      [selectedChildId]="selectedChildId"
      [saving]="(saving$ | async) ?? false"
      (createAnamnesis)="onCreateAnamnesis()"
    ></app-anamnesis-empty-state>

    <ng-container *ngIf="anamnesis$ | async as anamnesis">
      <div class="anamnesis-page__grid">
        <app-birth-section
          [data]="anamnesis.birth"
          [saving]="(saving$ | async) ?? false"
          (save)="onSaveBirth($event)"
          (delete)="onDeleteBirth()"
        ></app-birth-section>

        <app-motor-development-section
          [data]="anamnesis.motorDevelopment"
          [saving]="(saving$ | async) ?? false"
          (save)="onSaveMotorDevelopment($event)"
          (delete)="onDeleteMotorDevelopment()"
        ></app-motor-development-section>

        <app-language-communication-section
          [data]="anamnesis.languageCommunication"
          [saving]="(saving$ | async) ?? false"
          (save)="onSaveLanguageCommunication($event)"
          (delete)="onDeleteLanguageCommunication()"
        ></app-language-communication-section>

        <app-health-section
          [data]="anamnesis.health"
          [saving]="(saving$ | async) ?? false"
          (save)="onSaveHealth($event)"
          (delete)="onDeleteHealth()"
        ></app-health-section>

        <app-behavior-section
          [data]="anamnesis.behavior"
          [saving]="(saving$ | async) ?? false"
          (save)="onSaveBehavior($event)"
          (delete)="onDeleteBehavior()"
        ></app-behavior-section>

        <app-routine-section
          [data]="anamnesis.routine"
          [saving]="(saving$ | async) ?? false"
          (save)="onSaveRoutine($event)"
          (delete)="onDeleteRoutine()"
        ></app-routine-section>

        <app-general-notes-section
          [generalNotes]="anamnesis.generalNotes"
          [saving]="(saving$ | async) ?? false"
          (save)="onSaveGeneralNotes($event)"
        ></app-general-notes-section>
      </div>
    </ng-container>
  </ng-template>
</section>
