<section class="card-ui card-ui--md">
  <div class="card-ui__body">
    <h2 class="card-ui__title" *ngIf="!selectedChildId">Selecione uma criança</h2>
    <h2 class="card-ui__title" *ngIf="selectedChildId">Nenhuma anamnese encontrada</h2>

    <p class="card-ui__subtitle" *ngIf="!selectedChildId">
      Escolha uma criança acima para visualizar ou criar informações de anamnese.
    </p>
    <p class="card-ui__subtitle" *ngIf="selectedChildId">
      Crie uma anamnese para começar a adicionar informações.
    </p>

    <button
      *ngIf="selectedChildId"
      class="btn-ui btn-ui--green"
      type="button"
      (click)="createAnamnesis.emit()"
      [disabled]="saving"
    >
      Criar anamnese
    </button>
  </div>
</section>
