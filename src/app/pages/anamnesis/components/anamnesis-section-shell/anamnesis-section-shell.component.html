<article class="card-ui card-ui--md anamnesis-section-shell">
  <div class="card-ui__body">
    <div class="anamnesis-section-shell__header">
      <div>
        <h2 class="card-ui__title">{{ title }}</h2>
        <p class="card-ui__subtitle">{{ subtitle }}</p>
      </div>

      <div class="anamnesis-section-shell__actions">
        <button
          class="btn-ui btn-ui--outline btn-ui--sm"
          type="button"
          (click)="edit.emit()"
          [disabled]="editing || saving"
        >
          {{ editing ? "Editando" : exists ? "Editar" : "Adicionar" }}
        </button>

        <button
          *ngIf="exists && canDelete"
          class="btn-ui btn-ui--accent btn-ui--sm"
          type="button"
          (click)="delete.emit()"
          [disabled]="saving"
        >
          Excluir
        </button>

        <button
          *ngIf="editing"
          class="btn-ui btn-ui--outline btn-ui--sm"
          type="button"
          (click)="cancel.emit()"
          [disabled]="saving"
        >
          Cancelar
        </button>
      </div>
    </div>

    <ng-content></ng-content>
  </div>
</article>
