<app-anamnesis-section-shell
  title="Comportamento"
  subtitle="Interação, ansiedade e atenção."
  [exists]="!!data"
  [editing]="editing"
  [saving]="saving"
  (edit)="onEdit()"
  (cancel)="onCancel()"
  (delete)="delete.emit()"
>
  <ng-container *ngIf="!editing">
    <p *ngIf="!data" class="text-muted mb-0">Nenhuma informação ainda.</p>

    <div *ngIf="data" class="anamnesis-section__grid">
      <div class="anamnesis-section__field"><strong>Dificuldade de concentração:</strong> {{ data.concentrationDifficulty ?? "-" }}</div>
      <div class="anamnesis-section__field"><strong>Interação:</strong> {{ data.interaction ?? "-" }}</div>
      <div class="anamnesis-section__field"><strong>Preferência de atividade:</strong> {{ data.activityPreference ?? "-" }}</div>
      <div class="anamnesis-section__field"><strong>Ansiedade:</strong> {{ data.anxiety ?? "-" }}</div>
      <div class="anamnesis-section__field"><strong>Hiperatividade:</strong> {{ data.hyperactivity ?? "-" }}</div>
    </div>
  </ng-container>

  <form *ngIf="editing" class="anamnesis-section__form" [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="anamnesis-section__form-grid">
      <div class="input-ui anamnesis-section__span-2">
        <div class="input-ui__field">
          <input class="input-ui__control" type="text" formControlName="concentrationDifficulty" placeholder=" " />
          <label class="input-ui__label">Dificuldade de concentração</label>
        </div>
      </div>
      <div class="input-ui anamnesis-section__span-2">
        <div class="input-ui__field">
          <input class="input-ui__control" type="text" formControlName="interaction" placeholder=" " />
          <label class="input-ui__label">Interação</label>
        </div>
      </div>
      <div class="input-ui anamnesis-section__span-2">
        <div class="input-ui__field">
          <input class="input-ui__control" type="text" formControlName="activityPreference" placeholder=" " />
          <label class="input-ui__label">Preferência de atividade</label>
        </div>
      </div>
      <div class="input-ui">
        <div class="input-ui__field">
          <input class="input-ui__control" type="text" formControlName="anxiety" placeholder=" " />
          <label class="input-ui__label">Ansiedade</label>
        </div>
      </div>
      <div class="input-ui">
        <div class="input-ui__field">
          <input class="input-ui__control" type="text" formControlName="hyperactivity" placeholder=" " />
          <label class="input-ui__label">Hiperatividade</label>
        </div>
      </div>
    </div>

    <div class="anamnesis-section__footer">
      <button class="btn-ui btn-ui--green" type="submit" [disabled]="saving">Salvar</button>
    </div>
  </form>
</app-anamnesis-section-shell>
