<section class="card-ui card-ui--md child-selector">
  <div class="card-ui__body">
    <div class="child-selector__header">
      <div>
        <h2 class="card-ui__title">Child selection</h2>
        <p class="card-ui__subtitle">Search by name and open the anamnesis for the right child before editing.</p>
      </div>

      <div class="child-selector__count">
        {{ filteredChildren.length }} result<span *ngIf="filteredChildren.length !== 1">s</span>
      </div>
    </div>

    <div class="child-selector__search">
      <label class="child-selector__label" for="anamnesis-child-search">Search child</label>
      <input
        id="anamnesis-child-search"
        class="child-selector__search-input"
        type="search"
        [(ngModel)]="searchTerm"
        placeholder="Type the child's name"
        autocomplete="off"
      />
    </div>

    <div class="select-ui select-ui--lg">
      <div class="select-ui__field">
        <select
          id="child-selector__select"
          class="select-ui__control"
          [ngModel]="selectedChildId || ''"
          (ngModelChange)="onSelect($event)"
          [disabled]="loading"
        >
          <option value="">No child selected</option>
          <option *ngFor="let child of filteredChildren; trackBy: trackById" [value]="child.id">
            {{ child.name }} - {{ child.age }} years
          </option>
        </select>

        <label class="select-ui__label" for="child-selector__select">Associated children</label>
        <span class="select-ui__arrow" aria-hidden="true">v</span>
      </div>
    </div>

    <p *ngIf="loading" class="child-selector__hint">Loading children...</p>
    <p *ngIf="!loading && filteredChildren.length === 0" class="child-selector__hint">
      No child found with this search.
    </p>
  </div>
</section>
