<section class="card-ui--sm child-selector">
  <div class="child-selector-body">

    <div class="child-selector__search">
      <label class="child-selector__label" for="anamnesis-child-search">Pesquisar criança</label>
      <input
        id="anamnesis-child-search"
        class="child-selector__search-input"
        type="search"
        [(ngModel)]="searchTerm"
        placeholder="Ex: Enzo"
        autocomplete="off"
      />
    </div>

    <div class="select-ui select-ui--lg">
      <div class="select-ui__field">
        <select
          id="child-selector__select"
          class="select-ui__control"
          [ngModel]="selectedChildId || ''"
          (ngModelChange)="onSelect($event)"
          [disabled]="loading"
        >
          <option value="">Clique aqui</option>
          <option *ngFor="let child of filteredChildren; trackBy: trackById" [value]="child.id">
            {{ child.name }} - {{ child.age }} anos
          </option>
        </select>

        <label class="select-ui__label" for="child-selector__select">Crianças associadas</label>
      </div>
      <div class="child-selector__count">
        {{ filteredChildren.length }} resultado<span *ngIf="filteredChildren.length !== 1">s</span> nesta visualização.
      </div>
    </div>

    <p *ngIf="loading" class="child-selector__hint">Carregando crianças...</p>
    <p *ngIf="!loading && filteredChildren.length === 0" class="child-selector__hint">
      Nenhuma criança encontrada com esta pesquisa.
    </p>
  </div>
</section>
