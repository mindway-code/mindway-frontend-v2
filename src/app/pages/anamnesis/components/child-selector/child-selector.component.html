<section class="card-ui card-ui--md child-selector">
  <div class="card-ui__body">
    <h2 class="card-ui__title">Child</h2>
    <p class="card-ui__subtitle">Select a child to view and manage anamnesis information.</p>

    <label class="child-selector__label" for="child-selector__select">Select a child</label>
    <select
      id="child-selector__select"
      class="child-selector__control"
      [value]="selectedChildId || ''"
      (change)="onSelect($event)"
      [disabled]="loading"
    >
      <option value="">No child selected</option>
      <option *ngFor="let child of children || []" [value]="child.id">
        {{ child.name }} — {{ child.age }} years
      </option>
    </select>

    <p *ngIf="loading" class="text-muted mb-0 mt-2">Loading children...</p>
  </div>
</section>
