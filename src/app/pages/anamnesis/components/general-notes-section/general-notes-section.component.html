<app-anamnesis-section-shell
  title="General notes"
  subtitle="Additional notes and observations."
  [exists]="true"
  [editing]="editing"
  [saving]="saving"
  [canDelete]="false"
  (edit)="onEdit()"
  (cancel)="onCancel()"
>
  <ng-container *ngIf="!editing">
    <p class="mb-0">{{ generalNotes || "No notes yet." }}</p>
  </ng-container>

  <form *ngIf="editing" class="anamnesis-section__form" [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="input-ui">
      <div class="input-ui__field">
        <textarea class="input-ui__control" formControlName="generalNotes" placeholder=" "></textarea>
        <label class="input-ui__label">General notes</label>
      </div>
    </div>

    <div class="anamnesis-section__footer">
      <button class="btn-ui btn-ui--green" type="submit" [disabled]="saving">Save</button>
    </div>
  </form>
</app-anamnesis-section-shell>
