<app-anamnesis-section-shell
  title="Motor development"
  subtitle="Posture and coordination milestones."
  [exists]="!!data"
  [editing]="editing"
  [saving]="saving"
  (edit)="onEdit()"
  (cancel)="onCancel()"
  (delete)="delete.emit()"
>
  <ng-container *ngIf="!editing">
    <p *ngIf="!data" class="text-muted mb-0">No information yet.</p>

    <div *ngIf="data" class="anamnesis-section__grid">
      <div class="anamnesis-section__field"><strong>Neck control age:</strong> {{ data.neckControlAgeMonths ?? "-" }}</div>
      <div class="anamnesis-section__field"><strong>Sitting age:</strong> {{ data.sittingAgeMonths ?? "-" }}</div>
      <div class="anamnesis-section__field"><strong>Crawling age:</strong> {{ data.crawlingAgeMonths ?? "-" }}</div>
      <div class="anamnesis-section__field"><strong>First steps age:</strong> {{ data.firstStepsAgeMonths ?? "-" }}</div>
      <div class="anamnesis-section__field"><strong>Fine coordination:</strong> {{ data.fineCoordination ?? "-" }}</div>
    </div>
  </ng-container>

  <form *ngIf="editing" class="anamnesis-section__form" [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="anamnesis-section__form-grid">
      <div class="input-ui">
        <div class="input-ui__field">
          <input class="input-ui__control" type="number" formControlName="neckControlAgeMonths" placeholder=" " />
          <label class="input-ui__label">Neck control age (months)</label>
        </div>
      </div>
      <div class="input-ui">
        <div class="input-ui__field">
          <input class="input-ui__control" type="number" formControlName="sittingAgeMonths" placeholder=" " />
          <label class="input-ui__label">Sitting age (months)</label>
        </div>
      </div>
      <div class="input-ui">
        <div class="input-ui__field">
          <input class="input-ui__control" type="number" formControlName="crawlingAgeMonths" placeholder=" " />
          <label class="input-ui__label">Crawling age (months)</label>
        </div>
      </div>
      <div class="input-ui">
        <div class="input-ui__field">
          <input class="input-ui__control" type="number" formControlName="firstStepsAgeMonths" placeholder=" " />
          <label class="input-ui__label">First steps age (months)</label>
        </div>
      </div>
      <div class="input-ui anamnesis-section__span-2">
        <div class="input-ui__field">
          <input class="input-ui__control" type="text" formControlName="fineCoordination" placeholder=" " />
          <label class="input-ui__label">Fine coordination</label>
        </div>
      </div>
    </div>

    <div class="anamnesis-section__footer">
      <button class="btn-ui btn-ui--green" type="submit" [disabled]="saving">Save</button>
    </div>
  </form>
</app-anamnesis-section-shell>
