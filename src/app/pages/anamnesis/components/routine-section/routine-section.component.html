<app-anamnesis-section-shell
  title="Routine"
  subtitle="Daily routine and schedules."
  [exists]="!!data"
  [editing]="editing"
  [saving]="saving"
  (edit)="onEdit()"
  (cancel)="onCancel()"
  (delete)="delete.emit()"
>
  <ng-container *ngIf="!editing">
    <p *ngIf="!data" class="text-muted mb-0">No information yet.</p>

    <div *ngIf="data" class="anamnesis-section__grid">
      <div class="anamnesis-section__field"><strong>Wakes up at:</strong> {{ data.wakesUpAt ?? "-" }}</div>
      <div class="anamnesis-section__field"><strong>Sleeps at:</strong> {{ data.sleepsAt ?? "-" }}</div>
      <div class="anamnesis-section__field"><strong>Therapies:</strong> {{ data.therapies ?? "-" }}</div>
      <div class="anamnesis-section__field"><strong>School period:</strong> {{ data.schoolPeriod ?? "-" }}</div>
      <div class="anamnesis-section__field"><strong>Extra activity:</strong> {{ data.extraActivity ?? "-" }}</div>
      <div class="anamnesis-section__field anamnesis-section__span-2"><strong>Observation:</strong> {{ data.routineObservation ?? "-" }}</div>
    </div>
  </ng-container>

  <form *ngIf="editing" class="anamnesis-section__form" [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="anamnesis-section__form-grid">
      <div class="input-ui">
        <div class="input-ui__field">
          <input class="input-ui__control" type="text" formControlName="wakesUpAt" placeholder=" " />
          <label class="input-ui__label">Wakes up at</label>
        </div>
      </div>
      <div class="input-ui">
        <div class="input-ui__field">
          <input class="input-ui__control" type="text" formControlName="sleepsAt" placeholder=" " />
          <label class="input-ui__label">Sleeps at</label>
        </div>
      </div>
      <div class="input-ui anamnesis-section__span-2">
        <div class="input-ui__field">
          <input class="input-ui__control" type="text" formControlName="therapies" placeholder=" " />
          <label class="input-ui__label">Therapies</label>
        </div>
      </div>
      <div class="input-ui">
        <div class="input-ui__field">
          <input class="input-ui__control" type="text" formControlName="schoolPeriod" placeholder=" " />
          <label class="input-ui__label">School period</label>
        </div>
      </div>
      <div class="input-ui">
        <div class="input-ui__field">
          <input class="input-ui__control" type="text" formControlName="extraActivity" placeholder=" " />
          <label class="input-ui__label">Extra activity</label>
        </div>
      </div>
      <div class="input-ui anamnesis-section__span-2">
        <div class="input-ui__field">
          <textarea class="input-ui__control" formControlName="routineObservation" placeholder=" "></textarea>
          <label class="input-ui__label">Routine observation</label>
        </div>
      </div>
    </div>

    <div class="anamnesis-section__footer">
      <button class="btn-ui btn-ui--green" type="submit" [disabled]="saving">Save</button>
    </div>
  </form>
</app-anamnesis-section-shell>
