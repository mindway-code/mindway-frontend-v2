<button class="child-card card-ui--sm" type="button" [class.child-card--active]="active" (click)="selectChild.emit(child)">
  <div class="card-ui__body child-card__body">
    <div class="child-card__header">
      <h3 class="child-card__title">{{ child.name }}</h3>
      <span class="child-card__age">{{ child.age }} anos</span>
    </div>

    <p class="child-card__meta">
      Nascimento {{ child.birthDate | date: "mediumDate" }}
    </p>
  </div>
</button>
