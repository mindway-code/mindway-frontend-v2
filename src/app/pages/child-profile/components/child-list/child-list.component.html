<div class="child-list" *ngIf="children?.length; else emptyTpl">
  <app-child-profile-card
    *ngFor="let child of children; trackBy: trackById"
    [child]="child"
    [active]="child.id === selectedChildId"
    (selectChild)="selectChild.emit($event)"
  ></app-child-profile-card>
</div>

<ng-template #emptyTpl>
  <div class="child-list__empty text-muted">Nenhuma criança disponível.</div>
</ng-template>
