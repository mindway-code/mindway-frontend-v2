<article class="child-card card-ui card-ui--md">
  <header class="child-card__header">
    <div class="child-card__identity">
      <div class="child-card__avatar" aria-hidden="true">{{ child.name.slice(0, 1) || "C" }}</div>
      <div class="child-card__text">
        <h3 class="child-card__title">{{ child.name }}</h3>
        <p class="child-card__subtitle">
          Age: <strong>{{ child.age }}</strong> · Birth: <strong>{{ birthDateLabel }}</strong>
        </p>
      </div>
    </div>
  </header>

  <div class="child-card__body">
    <p class="child-card__row">
      <span class="child-card__label">Access code</span>
      <span class="child-card__value child-card__value--mono">{{ child.accessCode }}</span>
    </p>

    <p class="child-card__row">
      <span class="child-card__label">Created</span>
      <span class="child-card__value">{{ createdAtLabel }}</span>
    </p>

    <p class="child-card__row" *ngIf="child.observation">
      <span class="child-card__label">Observation</span>
      <span class="child-card__value child-card__value--wrap">{{ child.observation }}</span>
    </p>
  </div>

  <footer class="child-card__footer">
    <a
      class="btn-ui btn-ui--light btn-ui--sm"
      routerLink="/anamnesis"
      [queryParams]="{ childId: child.id }"
    >
      View Anamnesis
    </a>

    <a class="btn-ui btn-ui--light btn-ui--sm" routerLink="/child-profile" [queryParams]="{ childId: child.id }">
      View Child Profile
    </a>
  </footer>
</article>
