<section class="child-create card-ui card-ui--md">
  <header class="child-create__header">
    <div>
      <h3 class="child-create__title">Add child</h3>
      <p class="child-create__subtitle">Create a child profile linked to your account.</p>
    </div>

    <div class="child-create__actions">
      <button class="btn-ui btn-ui--light btn-ui--sm" type="button" (click)="cancel.emit()" [disabled]="saving">
        Close
      </button>

      <button class="btn-ui btn-ui--green btn-ui--sm" type="button" (click)="submit()" [disabled]="saving">
        <ng-container *ngIf="!saving; else savingTpl">Create child</ng-container>
        <ng-template #savingTpl>Creating...</ng-template>
      </button>
    </div>
  </header>

  <div *ngIf="error" class="child-create__error" role="alert">
    {{ error }}
  </div>

  <form class="child-create__form" [formGroup]="form" (ngSubmit)="submit()">
    <div class="child-create__grid">
      <div class="input-ui">
        <div class="input-ui__field">
          <input class="input-ui__control" formControlName="name" type="text" placeholder="Child name" />
          <label class="input-ui__label">Name</label>
        </div>
        <p class="child-create__hint" *ngIf="form.controls.name.touched && form.controls.name.invalid">
          Enter a name (at least 2 characters).
        </p>
      </div>

      <div class="input-ui">
        <div class="input-ui__field">
          <input class="input-ui__control" formControlName="age" type="number" placeholder="Age" min="0" />
          <label class="input-ui__label">Age</label>
        </div>
        <p class="child-create__hint" *ngIf="form.controls.age.touched && form.controls.age.invalid">
          Enter a valid age (0 or more).
        </p>
      </div>

      <div class="input-ui">
        <div class="input-ui__field">
          <input class="input-ui__control" formControlName="birthDate" type="date" placeholder="Birth date" />
          <label class="input-ui__label">Birth date</label>
        </div>
        <p class="child-create__hint" *ngIf="form.controls.birthDate.touched && form.controls.birthDate.invalid">
          Select a birth date.
        </p>
      </div>

      <div class="input-ui child-create__observation">
        <div class="input-ui__field">
          <textarea
            class="input-ui__control"
            formControlName="observation"
            placeholder="Notes (optional)"
            rows="3"
          ></textarea>
          <label class="input-ui__label">Observation (optional)</label>
        </div>
      </div>
    </div>
  </form>
</section>
