<section class="profile-edit card-ui card-ui--md">
  <header class="profile-edit__header">
    <div>
      <h2 class="card-ui__title profile-edit__title">Editar perfil</h2>
      <p class="card-ui__subtitle profile-edit__subtitle">Atualize os dados da sua conta.</p>
    </div>

    <div class="profile-edit__actions">
      <button
        class="btn-ui btn-ui--light btn-ui--sm"
        type="button"
        (click)="cancel.emit()"
        [disabled]="saving"
      >
        Cancelar
      </button>

      <button
        class="btn-ui btn-ui--green btn-ui--sm"
        type="button"
        (click)="submit()"
        [disabled]="saving"
      >
        <ng-container *ngIf="!saving; else savingTpl">Salvar alterações</ng-container>
        <ng-template #savingTpl>Salvando...</ng-template>
      </button>
    </div>
  </header>

  <div *ngIf="error" class="profile-edit__error" role="alert">
    {{ error }}
  </div>

  <form class="profile-edit__form" [formGroup]="form" (ngSubmit)="submit()">
    <div class="profile-edit__grid">
      <div class="input-ui">
        <div class="input-ui__field">
          <input
            class="input-ui__control"
            formControlName="name"
            type="text"
            placeholder="Nome"
            autocomplete="name"
          />
          <label class="input-ui__label">Nome</label>
        </div>

        <p class="profile-edit__hint" *ngIf="form.controls.name.touched && form.controls.name.invalid">
          Informe seu nome (pelo menos 2 caracteres).
        </p>
      </div>

      <div class="input-ui">
        <div class="input-ui__field">
          <input
            class="input-ui__control"
            formControlName="email"
            type="email"
            placeholder="E-mail"
            autocomplete="email"
          />
          <label class="input-ui__label">E-mail</label>
        </div>

        <p class="profile-edit__hint" *ngIf="form.controls.email.touched && form.controls.email.invalid">
          Informe um endereço de e-mail válido.
        </p>
      </div>
    </div>
  </form>
</section>
