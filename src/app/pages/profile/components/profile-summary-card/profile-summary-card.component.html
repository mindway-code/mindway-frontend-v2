<section class="profile-summary card-ui card-ui--md">
  <header class="profile-summary__header">
    <div class="profile-summary__identity">
      <img
        class="profile-summary__avatar"
        src="assets/img/placeholder.PNG"
        alt="Imagem padrão do perfil do usuário"
      />

      <div class="profile-summary__text">
        <p class="profile-summary__eyebrow">Conta</p>
        <h2 class="profile-summary__title">{{ user?.name || "Usuário" }}</h2>
        <p class="profile-summary__subtitle">{{ user?.email || "—" }}</p>
      </div>
    </div>
  </header>
</section>
