<section class="profile-page">
  <header class="profile-page__hero">
    <div class="profile-page__hero-content">
      <p class="profile-page__eyebrow">Conta</p>
      <h1 class="profile-page__title">Meu perfil</h1>
      <p class="profile-page__subtitle">
        Gerencie suas informações pessoais e os perfis de seus filhos em um só lugar.
      </p>
    </div>

    <div class="profile-page__hero-actions">
      <button
        *ngIf="!editMode; else editActions"
        class="btn-ui btn-ui--green btn-ui--sm"
        type="button"
        [disabled]="((userLoading$ | async) ?? false) && !((user$ | async) ?? null)"
        (click)="startEdit()"
      >
        Editar perfil
      </button>

      <ng-template #editActions>
        <button class="btn-ui btn-ui--light btn-ui--sm" type="button" (click)="cancelEdit()">
          Fechar
        </button>
      </ng-template>
    </div>
  </header>

  <div *ngIf="flashMessage" class="profile-page__flash" role="status">
    {{ flashMessage }}
  </div>

  <div *ngIf="userLoading$ | async" class="profile-page__state text-muted">Carregando seu perfil...</div>
  <div *ngIf="userError$ | async as userError" class="profile-page__state profile-page__state--error" role="alert">
    {{ userError }}
  </div>

  <div class="profile-page__grid">
    <ng-container *ngIf="user$ | async as user; else profileLoadingCards">
      <app-profile-summary-card [user]="user"></app-profile-summary-card>

      <app-profile-edit-form
        *ngIf="editMode"
        [user]="user"
        [saving]="(profileSaving$ | async) ?? false"
        [error]="(profileError$ | async) ?? null"
        (save)="saveProfile($event)"
        (cancel)="cancelEdit()"
      ></app-profile-edit-form>
    </ng-container>

    <ng-template #profileLoadingCards>
      <section class="card-ui card-ui--md profile-page__loading-card">
        <div class="card-ui__body loading-ui">
          <span class="loading-ui__line loading-ui__line--sm"></span>
          <span class="loading-ui__line loading-ui__line--md"></span>
          <span class="loading-ui__line loading-ui__line--lg"></span>
          <span class="loading-ui__block profile-page__loading-avatar"></span>
          <span class="loading-ui__line loading-ui__line--md"></span>
        </div>
      </section>

      <section class="card-ui card-ui--md profile-page__loading-card">
        <div class="card-ui__body loading-ui">
          <span class="loading-ui__line loading-ui__line--sm"></span>
          <span class="loading-ui__line loading-ui__line--lg"></span>
          <span class="loading-ui__line loading-ui__line--lg"></span>
          <span class="loading-ui__block loading-ui__block--sm"></span>
        </div>
      </section>
    </ng-template>
  </div>

  <app-children-section
    [children]="(children$ | async) ?? []"
    [loading]="(childrenLoading$ | async) ?? false"
    [saving]="(childrenSaving$ | async) ?? false"
    [error]="(childrenError$ | async) ?? null"
    [showCreate]="showCreateChild"
    (toggleCreate)="toggleCreateChild()"
    (createChild)="createChild($event)"
    (closeCreate)="closeCreateChild()"
  ></app-children-section>
</section>
