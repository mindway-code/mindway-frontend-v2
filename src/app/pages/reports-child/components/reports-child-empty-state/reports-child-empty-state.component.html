<div class="card-ui card-ui--md reports-child-empty">
  <div class="card-ui__body">
    <ng-container *ngIf="variant === 'no-children'; else noReports">
      <h3 class="card-ui__title">No child profile available</h3>
      <p class="card-ui__subtitle">
        To create reports, you need to be responsible for a child or connect to a child using an access code.
      </p>
      <a class="btn-ui btn-ui--outline btn-ui--sm" routerLink="/child-profile">Connect a child</a>
    </ng-container>

    <ng-template #noReports>
      <h3 class="card-ui__title">No reports yet</h3>
      <p class="card-ui__subtitle">
        No reports created for this child yet. Create the first report to track behavior, difficulty, and recommendations.
      </p>
      <button class="btn-ui btn-ui--green btn-ui--sm" type="button" (click)="create.emit()">Create report</button>
    </ng-template>
  </div>
</div>
