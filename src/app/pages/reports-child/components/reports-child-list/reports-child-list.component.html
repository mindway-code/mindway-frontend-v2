<section class="reports-child-list">
  <ng-container *ngIf="loading">
    <section class="reports-child-list__grid card-ui card-ui--md">
      <div class="card-ui__body loading-ui">
        <span class="loading-ui__line loading-ui__line--sm"></span>
        <span class="loading-ui__line loading-ui__line--lg"></span>
        <span class="loading-ui__block"></span>
      </div>
    </section>
  </ng-container>

  <ng-container *ngIf="!loading">
    <app-reports-child-empty-state
      *ngIf="selectedChildId && (reports?.length ?? 0) === 0"
      variant="no-reports"
      (create)="create.emit()"
    />

    <div class="reports-child-list__grid" *ngIf="(reports?.length ?? 0) > 0">
      <app-reports-child-card
        *ngFor="let report of reports; trackBy: trackById"
        [report]="report"
        [canManage]="!!report.canManage"
        (edit)="edit.emit($event)"
        (delete)="delete.emit(report)"
      />
    </div>
  </ng-container>
</section>
