<div class="card-ui card-ui--md reports-child-selector">
  <div class="card-ui__body">
    <div class="select-ui">
      <label class="select-ui__label" for="reportsChildSelect">Select child</label>

      <select
        id="reportsChildSelect"
        class="select-ui__field"
        [disabled]="loading || !(children?.length)"
        [ngModel]="selectedChildId || ''"
        (ngModelChange)="onChange($event)"
      >
        <option value="" disabled>Choose a child to manage reports</option>
        <option *ngFor="let child of children; trackBy: trackById" [value]="child.id">
          {{ child.name }} ({{ child.age }}y)
        </option>
      </select>
    </div>

    <p *ngIf="loading" class="reports-child-selector__hint">Loading children…</p>
  </div>
</div>
