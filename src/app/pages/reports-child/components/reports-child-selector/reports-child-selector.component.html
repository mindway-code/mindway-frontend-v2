<section class="card-ui card-ui--md reports-child-selector">
  <div class="card-ui__body">
    <div class="reports-child-selector__header">
      <div>
        <h2 class="card-ui__title">Seleção da criança</h2>
        <p class="card-ui__subtitle">Pesquise pelo nome e abra o histórico de relatórios da criança correta.</p>
      </div>

      <div class="reports-child-selector__count">
        {{ filteredChildren.length }} resultado<span *ngIf="filteredChildren.length !== 1">s</span>
      </div>
    </div>

    <div class="reports-child-selector__search">
      <label class="reports-child-selector__label" for="reports-child-search">Pesquisar criança</label>
      <input
        id="reports-child-search"
        class="reports-child-selector__search-input"
        type="search"
        [(ngModel)]="searchTerm"
        placeholder="Digite o nome da criança"
        autocomplete="off"
      />
    </div>

    <div class="select-ui select-ui--lg">
      <div class="select-ui__field">
        <select
          id="reportsChildSelect"
          class="select-ui__control"
          [disabled]="loading || !(children?.length)"
          [ngModel]="selectedChildId || ''"
          (ngModelChange)="onChange($event)"
        >
          <option value="" disabled>Escolha uma criança para gerenciar relatórios</option>
          <option *ngFor="let child of filteredChildren; trackBy: trackById" [value]="child.id">
            {{ child.name }} - {{ child.age }} anos
          </option>
        </select>

        <label class="select-ui__label" for="reportsChildSelect">Crianças associadas</label>
        <span class="select-ui__arrow" aria-hidden="true">v</span>
      </div>
    </div>

    <p *ngIf="loading" class="reports-child-selector__hint">Carregando crianças...</p>
    <p *ngIf="!loading && filteredChildren.length === 0" class="reports-child-selector__hint">
      Nenhuma criança encontrada com esta pesquisa.
    </p>
  </div>
</section>
