<!-- IDENTIFICAÇÃO DA CRIANÇA -->

<section class="section-card">

  <div class="section-title">

    <div class="icon-box green">👶</div>

    <h2>Identificação da Criança</h2>

  </div>

  <div class="form-grid">

    <div class="input-group">
      <label>Nome completo</label>
      <input type="text" placeholder="Ex: Lucas Oliveira">
    </div>

    <div class="input-group">
      <label>Data de nascimento</label>
      <input type="date">
    </div>

    <div class="input-group">
      <label>Idade</label>
      <input type="text" placeholder="Ex: 5 anos">
    </div>

    <div class="input-group">
      <label>Sexo</label>
      <select>
        <option>Selecione</option>
        <option>Masculino</option>
        <option>Feminino</option>
      </select>
    </div>

    <div class="input-group">
      <label>Escola</label>
      <input type="text" placeholder="Nome da escola">
    </div>

    <div class="input-group">
      <label>Série/Turma</label>
      <input type="text" placeholder="Ex: Jardim II">
    </div>

    <div class="input-group">
      <label>Cidade/Estado</label>
      <input type="text" placeholder="Ex: São Paulo/SP">
    </div>

    <div class="input-group">
      <label>Convênio médico</label>
      <input type="text" placeholder="Ex: Unimed">
    </div>

  </div>

</section>

<!-- GESTAÇÃO E NASCIMENTO -->

<section class="section-card">

  <div class="section-title">

    <div class="icon-box purple">🤍</div>

    <h2>Gestação e Nascimento</h2>

  </div>

  <div class="form-grid">

    <div class="input-group">

    </div>

    <div class="input-group">

        <option>Normal</option>
        <option>Cesária</option>
      </select>
    </div>

    <div class="input-group">

    <div class="input-group">

    </div>

    <div class="input-group">

    </div>

    <div class="input-group">
      <label>Tempo de internação</label>
      <input type="text" placeholder="Ex: 2 dias">
    </div>

  </div>

</section>
