<section class="profile-summary card-ui card-ui--md">
  <header class="profile-summary__header">
    <div class="profile-summary__identity">
      <img
        class="profile-summary__avatar"
        src="assets/img/placeholder.PNG"
        alt="Avatar do usuário"
      />

      <div class="profile-summary__text">
        <p class="profile-summary__eyebrow">Conta</p>
        <h2 class="profile-summary__title">{{ user?.name || "Usuário" }}</h2>
        <p class="profile-summary__subtitle">{{ user?.email || "—" }}</p>
      </div>
    </div>
  </header>

  <div class="profile-summary__meta">
    <div class="profile-summary__meta-item">
      <span class="profile-summary__meta-label">Função</span>
      <span class="profile-summary__meta-value">{{ user?.role || "—" }}</span>
    </div>

    <div class="profile-summary__meta-item">
      <span class="profile-summary__meta-label">ID do usuário</span>
      <span class="profile-summary__meta-value profile-summary__meta-value--mono">
        {{ user?.id || "—" }}
      </span>
    </div>
  </div>
</section>
